<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nicklas Di Tirro</title>
  <meta name="description" content="Nicklas Di Tirro — Electrical &amp; Computer Engineering student at UT Austin. Résumé, projects, and a daily puzzle." />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="wrap">
    <header class="hero">
      <div class="splash" aria-hidden="true"><span class="splash-inner" id="splash-inner"></span></div>

      <h1>Nicklas Di Tirro</h1>
      <p class="tagline">Electrical &amp; Computer Engineering @ UT Austin</p>

      <button class="resume-btn" type="button" id="resume-open" aria-haspopup="dialog">
        <span aria-hidden="true">▤</span> View Resume
      </button>

      <nav class="links" aria-label="Contact links">
        <a href="mailto:njdt9758@gmail.com">Email</a>
        <span class="dot" aria-hidden="true">·</span>
        <a href="https://www.linkedin.com/in/nicklas-di-tirro" target="_blank" rel="noopener">LinkedIn</a>
      </nav>
    </header>

    <section class="bio">
      <p>
        I'm a computer engineering student at the University of Texas at Austin
        (B.S., May 2027).
      </p>
      <p>
        yo.
      </p>
    </section>

    <section class="board" aria-labelledby="board-heading">
      <h2 id="board-heading">Daily puzzle leaderboard</h2>
      <p class="board-sub" id="board-date">Loading…</p>
      <ol class="board-list" id="board-list" aria-live="polite"></ol>
    </section>
  </main>

  <!-- Résumé preview modal -->
  <div class="modal" id="resume-modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-panel" role="dialog" aria-modal="true" aria-label="Résumé preview">
      <div class="modal-bar">
        <span class="modal-title">Resume</span>
        <div class="modal-actions">
          <a class="modal-btn primary" href="/resume.pdf" download>↓ Download</a>
          <a class="modal-btn" href="/resume.pdf" target="_blank" rel="noopener">Open tab ↗</a>
          <button class="modal-btn close" type="button" data-close aria-label="Close preview">✕</button>
        </div>
      </div>
      <div class="modal-doc">
        <iframe id="resume-frame" title="Résumé PDF preview" src="about:blank"></iframe>
      </div>
    </div>
  </div>

  <div class="cursor-trail" id="cursor-trail" aria-hidden="true"></div>

  <script>
    // --- Splash text (loaded from /splashes.txt so the list is easy to edit) ---
    (function () {
      const el = document.getElementById("splash-inner");
      const box = el.parentElement;

      // Scale the text down (never up) so long splashes fit the tilted box.
      function fit() {
        el.style.setProperty("--fit", "1");
        const avail = box.clientWidth;
        const natural = el.scrollWidth;
        if (natural > avail && natural > 0) {
          el.style.setProperty("--fit", (avail / natural).toFixed(3));
        }
      }

      function show(text) {
        el.textContent = text;
        fit();
      }

      fetch("/splashes.txt")
        .then((r) => (r.ok ? r.text() : ""))
        .then((raw) => {
          const lines = raw.split("\n").map((s) => s.trim()).filter(Boolean);
          if (!lines.length) return;

          // Pick one splash per page load (changes only on reload).
          show(lines[Math.floor(Math.random() * lines.length)]);
        })
        .catch(() => {});

      window.addEventListener("resize", fit);
    })();

    // --- Cursor glow orb: the glow IS the cursor. Tracks 1:1 (no lag),
    //     and swells/brightens over clickable things. ---
    (function () {
      const trail = document.getElementById("cursor-trail");
      const fine = window.matchMedia("(pointer: fine)").matches;
      if (!fine) { trail.remove(); return; }

      document.body.classList.add("custom-cursor"); // hide the native pointer
      trail.style.opacity = "0"; // stay hidden until the pointer first moves
      let seen = false;
      const hotSel = "a, button, summary, label, [data-close], .resume-btn, .modal-btn";

      window.addEventListener("pointermove", (e) => {
        trail.style.transform = "translate(" + e.clientX + "px," + e.clientY + "px)";
        if (!seen) { seen = true; trail.style.opacity = ""; }
        const hot = e.target.closest ? e.target.closest(hotSel) : null;
        trail.classList.toggle("hot", !!hot);
      }, { passive: true });
    })();

    // --- Résumé preview modal ---
    (function () {
      const modal = document.getElementById("resume-modal");
      const frame = document.getElementById("resume-frame");
      const openBtn = document.getElementById("resume-open");
      let lastFocus = null;

      function open() {
        lastFocus = document.activeElement;
        // Load the PDF only when opening (native viewer = scroll + zoom for free).
        if (frame.getAttribute("src") === "about:blank") {
          frame.setAttribute("src", "/resume.pdf#view=FitH");
        }
        modal.hidden = false;
        document.body.style.overflow = "hidden";
        modal.querySelector(".close").focus();
      }
      function close() {
        modal.hidden = true;
        document.body.style.overflow = "";
        if (lastFocus) lastFocus.focus();
      }

      openBtn.addEventListener("click", open);
      modal.addEventListener("click", (e) => {
        if (e.target.hasAttribute("data-close")) close();
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && !modal.hidden) close();
      });
    })();

    // --- Leaderboard (Step 2: fetch same-origin /api/leaderboard) ---
    (function () {
      const list = document.getElementById("board-list");
      const dateEl = document.getElementById("board-date");

      fetch("/api/leaderboard")
        .then((r) => {
          if (!r.ok) throw new Error("HTTP " + r.status);
          return r.json();
        })
        .then((data) => {
          dateEl.textContent = "Puzzle · " + data.date;
          list.innerHTML = "";
          for (const e of data.entries) {
            const li = document.createElement("li");
            li.className = "board-row";
            li.innerHTML =
              '<span class="board-name">' + e.name + "</span>" +
              '<span class="board-score">' + e.score + "</span>";
            list.appendChild(li);
          }
        })
        .catch(() => {
          dateEl.textContent = "Leaderboard unavailable right now.";
        });
    })();
  </script>
</body>
</html>
